{% extends "layout.html" %}
{% block content %}

<div class="game-page">
    <div class="game-cover">
        <img src="{{ game.image_path }}" alt="{{ game.title }}">
    </div>

    <div class="game-info">
        <h1>{{ game.title }}</h1>
        <p class="game-description">{{ game.bio }}</p>
    </div>

    <div class="game-actions">
        <button
            class="edit-button"
            hx-get="/edit_game_form?game_id={{ game.id }}"
            hx-target="#modal"
            hx-swap="innerHTML">
            Edit
        </button>

        <button
            class="remove-button"
            hx-get="/remove_game_form?game_id={{ game.id }}"
            hx-target="#modal"
            hx-swap="innerHTML">
            Remove
        </button>
    </div>
</div>

<div>

    <hr>

    <!-- REVIEWS -->
    <h2>Reviews</h2>

    <div class="posts">
        {% for review in game.reviews %}
            {% include "review_layout.html" %}
        {% endfor %}
    </div>

</div>

{% endblock content %}
